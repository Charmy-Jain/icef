<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisk Aero - Journey Section</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Base Styles extracted from the source */
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* Matching the site's dark theme */
            overflow-x: hidden;
            font-family: "Figtree", sans-serif;
        }

        /* The Journey Section Container */
        .journey-container {
            width: 100%;
            position: relative;
            background: #000;
            color: #fff;
            padding: 100px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Styling for the Heading provided in your prompt */
        .journey-heading {
            font-size: clamp(32px, 5vw, 64px);
            font-weight: 700;
            text-align: center;
            max-width: 800px;
            margin-bottom: 50px;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        /* Timeline & Aircraft Container Logic */
        .aircraft-timeline {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 20px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Hide scrollbar for clean look */
        }

        .gen-item {
            flex: 0 0 300px;
            scroll-snap-align: center;
            transition: transform 0.5s ease;
        }

        /* Framer-specific layout classes for compatibility */
        .framer-1v0x7zg { display: contents; }
        .framer-1u0p9p7 { position: relative; width: 100%; background: black; }
        
        /* Background Highlight/Animation elements */
        .animation-background {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <section class="journey-container" data-framer-name="Journey">
        
        <h2 class="journey-heading">
            The journey from our <br> Gen 1 to Gen 6 aircraft.
        </h2>

        <div class="framer-1v7v5k7" data-framer-name="Timeline Wrapper">
            <div class="aircraft-timeline">
                <div class="gen-item" data-gen="1">
                    <img src="https://framerusercontent.com/images/5KBWm5Np5yQbZkNHRSYSF6amWR8.jpg" alt="Gen 1" style="width:100%; border-radius:12px;">
                    <p>Generation 1</p>
                </div>
                <div class="gen-item" data-gen="6">
                    <img src="https://framerusercontent.com/images/EVd6601F5b8Cly1rEOuLni1F6co.svg" alt="Gen 6" style="width:100%; border-radius:12px;">
                    <p>Generation 6 (Latest)</p>
                </div>
            </div>
        </div>

    </section>

    <script src="https://framerusercontent.com/sites/20bIPPKgJ9irPd1zQAQ8Hz/script_main.K5G2W6H3.js" defer></script>
    
    <script>
        // Custom script to initialize the horizontal scroll animation 
        // to match the original site's feel.
        document.addEventListener('DOMContentLoaded', () => {
            const items = document.querySelectorAll('.gen-item');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.transform = 'scale(1.05)';
                        entry.target.style.opacity = '1';
                    } else {
                        entry.target.style.transform = 'scale(0.95)';
                        entry.target.style.opacity = '0.7';
                    }
                });
            }, { threshold: 0.5 });

            items.forEach(item => observer.observe(item));
        });
    </script>

</body>
</html>
